<!DOCTYPE html>
<html>
<head>
    <title>DevOps Platform Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #0f172a;
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            max-width: 700px;
        }

        h1 {
            color: #38bdf8;
        }

        .info {
            margin-top: 20px;
        }

        .badge {
            background: #22c55e;
            padding: 8px 12px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🚀 DevOps Platform Demo</h1>

    <p>
        Kubernetes + GitOps + Observability
    </p>

    <div class="info">
        <p>
            <strong>Version:</strong>
            <span class="badge">{{ version }}</span>
        </p>

        <p>
            <strong>Environment:</strong>
            {{ environment }}
        </p>

        <p>
            <strong>Hostname:</strong>
            {{ hostname }}
        </p>
    </div>

</div>

</body>
</html>
